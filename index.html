<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>23 de Mayo</title>
 
<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.ticket{
  width:90%;
  max-width:340px;
  background:#181818;
  border-radius:18px;
  padding:20px;
  text-align:center;
  box-shadow:0 0 25px rgba(255,0,90,0.35);
  animation:flotar 4s ease-in-out infinite;
}
@keyframes flotar{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}
img{
  width:100%;
  border-radius:12px;
  margin-bottom:15px;
}
h1,h2,h3{margin:5px 0;}
p{opacity:0.85;font-size:14px;}
button{
  margin-top:10px;
  padding:12px 22px;
  border:none;
  border-radius:20px;
  background:#ff0066;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{background:#ff2d85;}
.hidden{display:none;margin-top:15px;}
.playlist{margin-top:15px;font-size:13px;opacity:0.9;}
.qr{width:120px;margin:15px auto;}
.typing{margin-top:10px;min-height:40px;font-size:14px;opacity:0.9;}
</style>
</head>
 
<body>
<div class="ticket">
 
<img src="https://i.scdn.co/image/ab6761610000e5ebfb3eab7c2b7a6c3f0d9e4c29">
 
<h1>23 de Mayo</h1>
<p>Tienes 1 ticket reservado para ti</p>
<button onclick="abrir()">Abrir invitación</button>
 
<div id="contenido" class="hidden">
<h2>Concierto</h2>
<p>Milo J · 23 Mayo</p>
 
<audio id="musica">
  <source src="maj.mp3">
</audio>
<button onclick="play()">Escuchar</button>
 
<div class="playlist">
<b>Posible setlist</b><br>
M.A.I<br>
Milagrosa<br>
Rara Vez<br>
Milagrosa II
</div>
 
<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=Entrada23MAYO">
 
<div class="typing" id="typing"></div>
</div>
</div>
 
<script>
function abrir(){
  document.getElementById("contenido").style.display="block";
  escribir();
}
 
function play(){document.getElementById("musica").play();}
 
function escribir(){
  const texto="¿Vienes conmigo?";
  let i=0;
  function type(){
    if(i<texto.length){
      document.getElementById("typing").innerHTML+=texto.charAt(i);
      i++;
      setTimeout(type,80);
    }
  }
  type();
}
</script>
 
</body>
</html>
